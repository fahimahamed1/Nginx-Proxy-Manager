# Default server — handles unconfigured domains and ACME challenges
server {
    listen 80 default_server;
    {{#eq disable_ipv6 false}}
    listen [::]:80 default_server;
    {{/eq}}

    server_name _;

    client_header_buffer_size 8k;
    large_client_header_buffers 4 32k;

    location ^~ /.well-known/acme-challenge/ {
        auth_basic off;
        allow all;
        default_type "text/plain";
        root /data/letsencrypt-acme-challenge;
    }

    {{#eq mode "congratulations"}}
    root /data/nginx/default_www;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }
    {{/eq}}

    {{#eq mode "404"}}
    location / {
        default_type text/html;
        return 404 '<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>404 Not Found</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center}h1{font-size:6rem;font-weight:800;background:linear-gradient(135deg,#38bdf8,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:1rem}p{color:#94a3b8;font-size:1.125rem}</style></head><body><div><h1>404</h1><p>Not Found</p></div></body></html>';
    }
    {{/eq}}

    {{#eq mode "444"}}
    location / {
        return 444;
    }
    {{/eq}}

    {{#eq mode "redirect"}}
    location / {
        {{#if redirect_url}}
        return 302 {{redirect_url}};
        {{else}}
        return 302 https://$host$request_uri;
        {{/if}}
    }
    {{/eq}}

    {{#eq mode "html"}}
    root /data/nginx/default_host;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }
    {{/eq}}

    access_log /data/logs/default.log standard;
    error_log /data/logs/default.log;
}

server {
    listen 443 ssl default_server;
    {{#eq disable_ipv6 false}}
    listen [::]:443 ssl default_server;
    {{/eq}}

    server_name _;
    ssl_certificate /data/nginx/dummycert.pem;
    ssl_certificate_key /data/nginx/dummykey.pem;
    ssl_reject_handshake on;

    access_log /data/logs/default-ssl.log standard;
    error_log /data/logs/default-ssl.log;
}
