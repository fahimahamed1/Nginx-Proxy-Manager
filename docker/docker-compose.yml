services:

  # Nginx reverse proxy
  nginx:
    build:
      context: ..
      dockerfile: docker/nginx/Dockerfile
    image: nginx-proxy-manager-modern:nginx
    container_name: npm-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "81:81"
      - "443:443"
    volumes:
      - app-data:/data
      - letsencrypt:/etc/letsencrypt
      - nginx-include:/etc/nginx/conf.d/include
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/bin/check-health"]
      interval: 20s
      timeout: 10s
      start_period: 60s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '1.0'
        reservations:
          memory: 64M
    networks:
      - npm-internal

  # Backend API server
  backend:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    image: nginx-proxy-manager-modern:backend
    container_name: npm-backend
    restart: unless-stopped
    expose:
      - "3000"
    volumes:
      - app-data:/data
      - letsencrypt:/etc/letsencrypt
      - nginx-include:/etc/nginx/conf.d/include
    environment:
      - DATA_DIR=/data
      - TZ=${TZ:-UTC}
      - DISABLE_IPV6=${DISABLE_IPV6:-false}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:81}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M
    networks:
      - npm-internal

# Named volumes
volumes:
  app-data:
    name: npm-data
  letsencrypt:
    name: npm-letsencrypt
  nginx-include:
    name: npm-nginx-include

# Internal network
networks:
  npm-internal:
    driver: bridge
    name: npm-network
