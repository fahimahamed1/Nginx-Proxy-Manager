# Rotate nginx proxy logs daily, keep 14 days
/data/logs/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    create 0664 root root
    sharedscripts
    postrotate
        if [ -f /run/nginx/nginx.pid ]; then
            kill -USR1 "$(cat /run/nginx/nginx.pid)" 2>/dev/null || true
        fi
    endscript
}

/var/log/nginx/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    create 0664 root root
    sharedscripts
    postrotate
        if [ -f /run/nginx/nginx.pid ]; then
            kill -USR1 "$(cat /run/nginx/nginx.pid)" 2>/dev/null || true
        fi
    endscript
}
