user root;

worker_processes auto;

pid /run/nginx/nginx.pid;
worker_rlimit_nofile 65535;

pcre_jit on;

error_log /data/logs/error.log warn;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include                       mime.types;
    default_type                  application/octet-stream;

    sendfile                      on;
    server_tokens                 off;
    tcp_nopush                    on;
    tcp_nodelay                   on;
    client_body_temp_path         /tmp/nginx/body 1 2;
    keepalive_timeout             65;
    keepalive_requests            1000;

    gzip                          on;
    gzip_vary                     on;
    gzip_types                    text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length               256;
    gzip_proxied                  any;
    gzip_comp_level               4;

    proxy_ignore_client_abort     off;
    client_max_body_size          200m;
    client_header_buffer_size     8k;
    large_client_header_buffers   4 32k;
    server_names_hash_bucket_size 64;
    proxy_http_version            1.1;
    proxy_set_header              X-Forwarded-Scheme $scheme;
    proxy_set_header              X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header              Accept-Encoding "";
    proxy_connect_timeout         10s;
    proxy_read_timeout            60s;
    proxy_send_timeout            60s;
    proxy_buffering               on;
    proxy_buffer_size             32k;
    proxy_buffers                 8 64k;

    proxy_cache                   off;
    proxy_cache_path              /var/lib/nginx/cache/public  levels=1:2 keys_zone=public-cache:16m max_size=192m inactive=60m;

    log_format proxy '[$time_local] $upstream_cache_status $upstream_status $status - $request_method $scheme $host "$request_uri" [Client $remote_addr] [Length $body_bytes_sent] [Gzip $gzip_ratio] [Sent-to $server] "$http_user_agent" "$http_referer"';
    log_format standard '[$time_local] $status - $request_method $scheme $host "$request_uri" [Client $remote_addr] [Length $body_bytes_sent] [Gzip $gzip_ratio] "$http_user_agent" "$http_referer"';

    access_log /data/logs/default.log proxy;

    include conf.d/include/resolvers.conf;

    map $host $forward_scheme {
        default http;
    }

    map $host $server {
        default "";
    }

    map $host $port {
        default "";
    }

    set_real_ip_from 172.0.0.0/8;

    include conf.d/include/ip_ranges.conf;

    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # Static and dynamic server configs
    include conf.d/*.conf;
    include /data/nginx/default_host/*.conf;
    include /data/nginx/proxy_host/*.conf;
    include /data/nginx/redirection_host/*.conf;
    include /data/nginx/dead_host/*.conf;
    include /data/nginx/temp/*.conf;
    include /data/nginx/custom/http[.]conf;
}

stream {
    log_format stream '$remote_addr [$time_local] $protocol $status $bytes_sent $bytes_received $session_time';

    include /data/nginx/stream/*.conf;
}

include /data/nginx/custom/root[.]conf;
